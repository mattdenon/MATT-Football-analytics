        let currentPage = 0;
        const matchesPerPage = 15;
        let filteredMatches = [...allMatches];
        let valueOnly = false;

        function init() {
            updateStats();
            populateFilters();
            renderMatches();
        }

        function updateStats() {
            document.getElementById('totalMatches').textContent = allMatches.length;
            document.getElementById('matchCount').textContent = allMatches.length;
            document.getElementById('valueCount').textContent = allMatches.filter(m => m.edge > 5).length;
            document.getElementById('highConfCount').textContent = allMatches.filter(m => m.power >= 70).length;
        }

        function populateFilters() {
            const leagues = [...new Set(allMatches.map(m => m.league))].sort();
            const select = document.getElementById('leagueFilter');
            leagues.forEach(l => {
                const option = document.createElement('option');
                option.value = l;
                option.textContent = l;
                select.appendChild(option);
            });
        }

        function filterMatches() {
            const search = document.getElementById('searchInput').value.toLowerCase();
            const date = document.getElementById('dateFilter').value;
            const league = document.getElementById('leagueFilter').value;

            filteredMatches = allMatches.filter(m => {
                const matchSearch = m.home.toLowerCase().includes(search) || m.away.toLowerCase().includes(search);
                const matchDate = date === 'all' || m.date === date;
                const matchLeague = league === 'all' || m.league === league;
                const matchValue = valueOnly ? m.edge > 5 : true;
                return matchSearch && matchDate && matchLeague && matchValue;
            });

            currentPage = 0;
            document.getElementById('matchesContainer').innerHTML = '';
            renderMatches();
        }

        function toggleValueOnly() {
            valueOnly = !valueOnly;
            const btn = document.getElementById('valueBtn');
            btn.classList.toggle('bg-indigo-600');
            btn.classList.toggle('text-white');
            btn.classList.toggle('bg-slate-800');
            filterMatches();
        }

        function renderMatches() {
            const container = document.getElementById('matchesContainer');
            const start = currentPage * matchesPerPage;
            const end = start + matchesPerPage;
            const toShow = filteredMatches.slice(start, end);

            let currentDate = '';

            toShow.forEach(match => {
                if (match.date !== currentDate) {
                    currentDate = match.date;
                    const dateDiv = document.createElement('div');
                    dateDiv.className = 'date-badge px-4 py-2 rounded-lg text-sm font-bold text-white mt-4 mb-2';
                    const dateObj = new Date(match.date);
                    dateDiv.textContent = dateObj.toLocaleDateString('fr-FR', { weekday: 'long', day: 'numeric', month: 'long' });
                    container.appendChild(dateDiv);
                }

                const div = document.createElement('div');
                div.className = 'match-card glass-panel rounded-lg p-4 cursor-pointer';
                div.onclick = () => showDetails(match);
                
                const powerColor = match.power >= 75 ? 'text-emerald-400' : match.power >= 65 ? 'text-indigo-400' : 'text-slate-400';
                
                div.innerHTML = `
                    <div class="flex flex-col md:grid md:grid-cols-8 gap-4 items-center">
                        <div class="flex justify-between w-full md:block">
                            <span class="text-xs font-mono text-slate-400">${match.time}</span>
                            <span class="text-xs text-indigo-400 md:hidden">${match.league}</span>
                        </div>
                        <div class="w-full md:col-span-2">
                            <div class="font-bold text-white">${match.home}</div>
                            <div class="font-bold text-slate-400">${match.away}</div>
                            <div class="text-xs text-indigo-400 hidden md:block">${match.league}</div>
                        </div>
                        <div class="flex items-center gap-2 w-full md:justify-center">
                            <span class="text-lg font-bold ${powerColor}">${match.power}</span>
                            <div class="w-16 bg-slate-800 rounded-full h-1.5"><div class="power-bar h-1.5 rounded-full" style="width: ${match.power}%"></div></div>
                        </div>
                        <div class="text-xs mono w-full md:text-center">
                            <div class="text-emerald-400">${match.xGH}</div>
                            <div class="text-red-400">${match.xGA}</div>
                        </div>
                        <div class="hidden md:block text-xs text-slate-300 text-center">1:${match.prob.h}% X:${match.prob.d}% 2:${match.prob.a}%</div>
                        <div class="w-full md:text-center"><span class="safe-badge px-3 py-1 rounded text-xs">${match.safe}</span></div>
                        <div class="w-full md:text-center"><span class="value-badge px-3 py-1 rounded text-xs flex items-center justify-center gap-1">${match.value} <span class="text-[10px]">+${match.edge}%</span></span></div>
                    </div>
                `;
                container.appendChild(div);
            });

            document.getElementById('loadMoreBtn').style.display = end >= filteredMatches.length ? 'none' : 'block';
        }

        function loadMore() {
            currentPage++;
            renderMatches();
        }

        function exportCSV() {
            let csv = 'Date,Heure,Competition,Match,Power,Safe Pick,Value Pick,Edge\\n';
            filteredMatches.forEach(m => {
                csv += `${m.date},${m.time},"${m.league}","${m.home} vs ${m.away}",${m.power},"${m.safe}","${m.value}",${m.edge}\\n`;
            });
            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.setAttribute('href', url);
            a.setAttribute('download', 'analyse_24-30_mars_2026.csv');
            a.click();

        document.getElementById('dateFilter').addEventListener('change', filterMatches);
        document.getElementById('leagueFilter').addEventListener('change', filterMatches);
        
        document.getElementById('detailModal').addEventListener('click', function(e) {
            if (e.target === this) closeModal();
        });

        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') closeModal();
        });

        init();
    </script>
</body>
</html>
